server:
  port: 3000

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_chat?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf-8
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

zhipu:
  api-key: ${ZHIPU_API_KEY}
  base-url: https://open.bigmodel.cn/api/paas/v4
  text-model: glm-4.5-air
  vision-model: glm-4v-flash

jwt:
  secret: your-jwt-secret-at-least-256-bits
  expiration: 86400000

mcp:
  servers:
    - name: firecrawl
      type: stdio
      command: ["npx", "-y", "@firecrawl/mcp"]
      env:
        FIRECRAWL_API_KEY: "your-firecrawl-api-key"
